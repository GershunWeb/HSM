<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Тест на депрессию — Healthy Mind Space</title>
  <style>
    *, *:before, *:after { box-sizing: border-box; }
    body{font-family:Arial, sans-serif;background:#fbf0e3;color:#333;margin:0;padding-top:96px}
    header{ position: fixed; top:0; left:0; right:0; background:#fff; display:flex;justify-content:space-between;align-items:center;padding:14px 28px;box-shadow:0 3px 10px rgba(0,0,0,0.06); z-index:1000 }
    header .logo{ font-size:1.4em; font-weight:800; color:#444; text-decoration:none }
    .nav-center{ display:flex; gap:18px; font-size:16px; font-weight:600 }
    nav a{ text-decoration:none; color:#555 }
    .profile{ width:44px; height:44px; border-radius:50%; overflow:hidden; border:2px solid #f3f3f3 }
    .profile img{ width:100%; height:100%; object-fit:cover }
    .container{max-width:920px;margin:32px auto;padding:20px}
    .test-card{background:linear-gradient(180deg,#FFF7E6,#FFF1D0);padding:36px;border-radius:18px;box-shadow:0 18px 40px rgba(20,20,20,0.06);border:1px solid rgba(200,170,140,0.18)}
    h1{margin:0 0 10px 0;font-size:30px}
    p.lead{color:#444;font-size:16px;margin-bottom:14px}
    .question{margin:16px 0;padding:18px;background:#fff;border-radius:12px;border:1px solid #f0eae0}
    .meta{font-size:13px;color:#777;margin-bottom:8px}
    .actions{display:flex;gap:12px;margin-top:18px}
    .btn-primary{background:linear-gradient(180deg,#5A7D7C,#466a67);color:#fff;padding:12px 20px;border-radius:12px;border:none;cursor:pointer;text-decoration:none;font-weight:800}
    .btn-ghost{background:transparent;border:2px solid #5A7D7C;padding:10px 18px;border-radius:12px;color:#333}
    form.radio-group label{display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:10px}
  </style>
</head>
<body>
  <div id="top"></div>
  <header id="header">
    <a href="../imdex.html#top" class="logo">Healthy Mind Space</a>
    <nav class="nav-center">
      <a href="../imdex.html#specialists">Консультации</a>
      <a href="../imdex.html#tests">Тесты</a>
      <a href="../imdex.html#subscriptions">Подписки</a>
      <a href="../imdex.html#reviews">Отзывы</a>
      <a href="../imdex.html#about">О Проекте</a>
      <a href="../imdex.html#contacts">Контакты</a>
    </nav>
    <div class="profile"><img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=800&auto=format&fit=crop" alt="Фото профиля"></div>
  </header>

  <main class="container">
    <section class="test-card" id="quiz">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap">
        <div>
          <h1>Тест на депрессию</h1>
          <p class="lead">Вопросы направлены на самооценку настроения и активности. Результат носит ознакомительный характер.</p>
        </div>
        <div style="min-width:220px;text-align:right">
          <div id="progressText" style="font-weight:700;color:#5A7D7C">Вопрос 1 / 7</div>
          <div style="height:8px;background:rgba(90,125,124,0.12);border-radius:10px;margin-top:8px;overflow:hidden">
            <div id="progressBar" style="height:100%;width:0;background:linear-gradient(90deg,#5A7D7C,#708f86)"></div>
          </div>
        </div>
      </div>

      <div id="questionArea" style="margin-top:20px"></div>

      <div class="actions" style="margin-top:22px;justify-content:space-between;">
        <a href="../imdex.html" class="btn-ghost">Назад</a>
        <div style="display:flex;gap:12px">
          <button id="prevBtn" class="btn-ghost" disabled>Назад</button>
          <button id="nextBtn" class="btn-primary">Далее</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      { q: 'Снижено ли у вас настроение большую часть времени?', options:['Нет','Иногда','Часто','Постоянно'], values:[0,1,2,3] },
      { q: 'Уменьшился ли интерес к занятиям, которые раньше приносили удовольствие?', options:['Нет','Иногда','Часто','Постоянно'], values:[0,1,2,3] },
      { q: 'Чувствуете ли вы усталость и снижение энергии?', options:['Нет','Иногда','Часто','Постоянно'], values:[0,1,2,3] },
      { q: 'Есть ли у вас проблемы со сном (сонливость или бессонница)?', options:['Нет','Иногда','Часто','Практически всегда'], values:[0,1,2,3] },
      { q: 'Ощущаете ли вы чувство никчёмности или вины без явной причины?', options:['Нет','Иногда','Часто','Постоянно'], values:[0,1,2,3] },
      { q: 'Затрудняется ли вам принимать решения и концентрироваться?', options:['Нет','Иногда','Часто','Всегда'], values:[0,1,2,3] },
      { q: 'Есть ли у вас мысли о том, что вы бы предпочли быть мёртвым?', options:['Никогда','Иногда','Часто','Постоянно'], values:[0,1,2,3] }
    ];

    let idx=0; const answers=new Array(questions.length).fill(null);
    const qArea=document.getElementById('questionArea'), progressBar=document.getElementById('progressBar'), progressText=document.getElementById('progressText');
    const prevBtn=document.getElementById('prevBtn'), nextBtn=document.getElementById('nextBtn');

    function renderQuestion(i){ const item=questions[i]; qArea.innerHTML = `
      <div class="question">
        <div class="meta">Вопрос ${i+1} из ${questions.length}</div>
        <div style="font-size:18px;font-weight:700;margin-top:6px">${item.q}</div>
        <form id="qform" class="radio-group" style="margin-top:12px">
          ${item.options.map((opt,k)=>`<label><input type="radio" name="opt" value="${item.values[k]}" ${answers[i]===item.values[k]?'checked':''}> ${opt}</label>`).join('')}
        </form>
      </div>`;
      progressText.textContent = `Вопрос ${i+1} / ${questions.length}`; progressBar.style.width = `${Math.round((i)/questions.length*100)}%`;
      prevBtn.disabled = i===0; nextBtn.textContent = i===questions.length-1 ? 'Завершить' : 'Далее';
    }

    function collectAnswer(){ const form=document.querySelector('#qform'); if(!form) return null; const v=form.opt.value; return v===undefined?null:Number(v); }
    prevBtn.addEventListener('click', ()=>{ if(idx>0) idx--; renderQuestion(idx); });
    nextBtn.addEventListener('click', ()=>{ const val=collectAnswer(); if(val===null||isNaN(val)){ alert('Выберите ответ, чтобы продолжить.'); return } answers[idx]=val; if(idx<questions.length-1){ idx++; renderQuestion(idx) } else showResult(); });

    function showResult(){ const total=answers.reduce((s,n)=>s+(n||0),0); const max=questions.length*3; const pct=Math.round(total/max*100);
      qArea.innerHTML = `
        <div style="text-align:center">
          <h2>Результат</h2>
          <div style="font-size:42px;font-weight:800;color:#5A7D7C;margin:12px 0">${total} / ${max}</div>
          <p style="font-size:18px;color:#444">Оценка депрессивных симптомов: <strong>${interpret(total)}</strong></p>
          <div style="margin-top:18px;background:#fff;padding:14px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.04);text-align:left">
            <p style="margin:0 0 8px">Рекомендации:</p>
            ${recommendations(total)}
          </div>
          <div style="margin-top:18px;display:flex;gap:12px;justify-content:center">
            <button class="btn-ghost" onclick="restart()">Пройти заново</button>
            <a class="btn-primary" href="../imdex.html#specialists">Посмотреть специалистов</a>
          </div>
        </div>
      `; progressBar.style.width='100%'; progressText.textContent = `Результат — ${pct}%`; prevBtn.disabled=true; nextBtn.disabled=true; nextBtn.style.opacity=0.6;
    }

    function interpret(score){ if(score<=6) return 'Низкий'; if(score<=12) return 'Умеренный'; if(score<=15) return 'Выраженный'; return 'Сильный'; }
    function recommendations(score){ if(score<=6) return '<ul><li>Поддерживайте режим сна и активности, общайтесь с близкими.</li></ul>'; if(score<=12) return '<ul><li>Рассмотрите краткую консультацию со специалистом.</li></ul>'; if(score<=15) return '<ul><li>Рекомендуется консультация специалиста и возможная терапия.</li></ul>'; return '<ul><li>Срочно обратитесь к специалисту для оценки состояния.</li></ul>'; }
    function restart(){ answers.fill(null); idx=0; prevBtn.disabled=false; nextBtn.disabled=false; nextBtn.style.opacity=1; renderQuestion(0); }

    renderQuestion(0);
  </script>
</body>
</html>
